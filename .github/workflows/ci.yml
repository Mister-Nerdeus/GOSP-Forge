name: ci
on:
  pull_request:
  push:
    branches: [develop, staging, main]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: node scripts/controls/verify-runtime-version.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm validate:examples
      - run: pnpm simulate:clean-water
      - run: pnpm estimate:clean-water
      - run: pnpm audit
      - run: pnpm run audit
